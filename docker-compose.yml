version: "3.9"

# Observability Control Plane — full stack
# Start: docker compose up -d
# Stop:  docker compose down

networks:
  ocp:
    driver: bridge

volumes:
  postgres_data:
  redis_data:
  rabbitmq_data:
  prometheus_data:
  grafana_data:

services:

  # ── Infrastructure ──────────────────────────────────────────────────────────

  postgres:
    image: postgres:15-alpine
    networks: [ocp]
    environment:
      POSTGRES_USER: demo
      POSTGRES_PASSWORD: demo
      POSTGRES_DB: ocp
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/init/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5436:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U demo -d ocp"]
      interval: 5s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    networks: [ocp]
    volumes:
      - redis_data:/data
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 10

  rabbitmq:
    image: rabbitmq:3.13-management-alpine
    networks: [ocp]
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    ports:
      - "5672:5672"
      - "15672:15672"   # management UI
      - "15692:15692"   # prometheus plugin
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "ping"]
      interval: 10s
      timeout: 10s
      retries: 10

  # ── Exporters ───────────────────────────────────────────────────────────────

  postgres-exporter:
    image: prometheuscommunity/postgres-exporter:v0.15.0
    networks: [ocp]
    environment:
      DATA_SOURCE_NAME: "postgresql://demo:demo@postgres:5432/ocp?sslmode=disable"
    depends_on:
      postgres:
        condition: service_healthy

  redis-exporter:
    image: oliver006/redis_exporter:v1.61.0
    networks: [ocp]
    environment:
      REDIS_ADDR: redis://redis:6379
    depends_on:
      redis:
        condition: service_healthy

  # ── Go services ─────────────────────────────────────────────────────────────

  api-gateway:
    build:
      context: ./services/api-gateway
      dockerfile: Dockerfile
    networks: [ocp]
    ports:
      - "8080:8080"
    environment:
      PORT: "8080"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8080/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  db-service:
    build:
      context: ./services/db-service
      dockerfile: Dockerfile
    networks: [ocp]
    ports:
      - "8081:8081"
    environment:
      PORT: "8081"
      DATABASE_URL: postgres://demo:demo@postgres:5432/ocp?sslmode=disable
    depends_on:
      postgres:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8081/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  queue-worker:
    build:
      context: ./services/queue-worker
      dockerfile: Dockerfile
    networks: [ocp]
    ports:
      - "8082:8082"
    environment:
      PORT: "8082"
      RABBITMQ_URL: amqp://guest:guest@rabbitmq:5672/
      WEBHOOK_URL: http://api-gateway:8080/api/v1/webhook
    depends_on:
      rabbitmq:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8082/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  background-job:
    build:
      context: ./services/background-job
      dockerfile: Dockerfile
    networks: [ocp]
    ports:
      - "8083:8083"
    environment:
      PORT: "8083"
      REDIS_URL: redis:6379
    depends_on:
      redis:
        condition: service_healthy
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "wget -q -O- http://localhost:8083/health || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5

  # ── Observability ────────────────────────────────────────────────────────────

  prometheus:
    image: prom/prometheus:v2.52.0
    networks: [ocp]
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml
      - ./config/alerting-rules.yml:/etc/prometheus/alerting-rules.yml
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    command:
      - --config.file=/etc/prometheus/prometheus.yml
      - --storage.tsdb.path=/prometheus
      - --web.enable-lifecycle
      - --web.enable-admin-api
    restart: unless-stopped

  grafana:
    image: grafana/grafana:10.4.0
    networks: [ocp]
    volumes:
      - grafana_data:/var/lib/grafana
      - ./dashboards:/var/lib/grafana/dashboards
      - ./config/grafana-provisioning:/etc/grafana/provisioning
    ports:
      - "3000:3000"
    environment:
      GF_SECURITY_ADMIN_USER: admin
      GF_SECURITY_ADMIN_PASSWORD: admin
      GF_USERS_ALLOW_SIGN_UP: "false"
      GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH: /var/lib/grafana/dashboards/overview.json
    depends_on:
      - prometheus
    restart: unless-stopped
