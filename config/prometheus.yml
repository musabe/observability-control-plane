global:
  scrape_interval: 10s
  evaluation_interval: 10s

rule_files:
  - /etc/prometheus/alerting-rules.yml

alerting:
  alertmanagers:
    - static_configs:
        - targets: []

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: [localhost:9090]

  - job_name: api-gateway
    static_configs:
      - targets: [api-gateway:8080]
    metrics_path: /metrics

  - job_name: db-service
    static_configs:
      - targets: [db-service:8081]
    metrics_path: /metrics

  - job_name: queue-worker
    static_configs:
      - targets: [queue-worker:8082]
    metrics_path: /metrics

  - job_name: background-job
    static_configs:
      - targets: [background-job:8083]
    metrics_path: /metrics

  - job_name: rabbitmq
    static_configs:
      - targets: [rabbitmq:15692]
    metrics_path: /metrics

  - job_name: postgres
    static_configs:
      - targets: [postgres-exporter:9187]

  - job_name: redis
    static_configs:
      - targets: [redis-exporter:9121]
