<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Vorsa — Control Plane</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;500;600&family=DM+Sans:wght@300;400;500&display=swap');
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg0:#0b0d11;--bg1:#0f1117;--bg2:#141720;--bg3:#1a1e28;--bg4:#1f2435;
  --b:rgba(255,255,255,0.06);--b2:rgba(255,255,255,0.1);
  --t1:#e8eaf0;--t2:#9ba3b8;--t3:#5c647a;
  --ok:#22c97a;--warn:#f0a42e;--crit:#ef4444;--blue:#4a9eff;--purple:#7c6ef7;
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{background:var(--bg0);color:var(--t1);font-family:var(--sans);font-size:13px;min-height:100vh}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-track{background:var(--bg1)}::-webkit-scrollbar-thumb{background:var(--bg4);border-radius:2px}
@keyframes ping{0%,100%{transform:scale(1);opacity:.4}50%{transform:scale(2);opacity:0}}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}
@keyframes slidein{from{opacity:0;transform:translateY(-3px)}to{opacity:1;transform:translateY(0)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.2}}

.topbar{display:flex;align-items:center;justify-content:space-between;padding:9px 18px;background:var(--bg1);border-bottom:1px solid var(--b);position:sticky;top:0;z-index:100;height:44px}
.brand{display:flex;align-items:center;gap:12px}
.brand-name{font-family:var(--mono);font-size:13px;font-weight:600;color:var(--t1)}
.brand-tag{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase;border-left:1px solid var(--b);padding-left:12px}
.topbar-r{display:flex;align-items:center;gap:14px}
.clock{font-family:var(--mono);font-size:10px;color:var(--t3)}
.pulse-wrap{display:flex;align-items:center;gap:6px;font-family:var(--mono);font-size:10px;color:var(--t3)}
.pulse-dot{width:6px;height:6px;border-radius:50%;background:var(--ok);animation:pulse 2s infinite}
.refresh-btn{font-family:var(--mono);font-size:10px;padding:3px 10px;border-radius:4px;border:1px solid var(--b2);background:transparent;color:var(--t3);cursor:pointer;transition:all .15s}
.refresh-btn:hover{color:var(--t1);border-color:rgba(255,255,255,.2)}

.layout{display:grid;grid-template-columns:185px 1fr;min-height:calc(100vh - 44px)}
.sidebar{background:var(--bg1);border-right:1px solid var(--b);padding:14px 0;overflow-y:auto}
.sb-sec{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.12em;text-transform:uppercase;padding:0 14px 6px}
.sb-env{display:flex;align-items:center;gap:7px;padding:7px 14px;background:var(--bg2);border-left:2px solid var(--purple);cursor:pointer}
.sb-env-inactive{display:flex;align-items:center;gap:7px;padding:7px 14px;cursor:pointer;border-left:2px solid transparent}
.sb-env-inactive:hover{background:var(--bg2)}
.sb-link{display:flex;align-items:center;gap:7px;padding:5px 14px;cursor:pointer}
.sb-link span{font-family:var(--mono);font-size:10px;color:var(--t3)}
.sb-link:hover span{color:var(--t2)}
.sb-sep{height:1px;background:var(--b);margin:8px 14px}
.dot{position:relative;width:8px;height:8px;flex-shrink:0}
.dot-i{width:8px;height:8px;border-radius:50%;position:absolute}
.dot-p{width:8px;height:8px;border-radius:50%;position:absolute;animation:ping 1.5s ease-in-out infinite}

.main{overflow-y:auto;padding:12px;display:flex;flex-direction:column;gap:10px}
.panel{background:var(--bg2);border:1px solid var(--b);border-radius:8px;padding:11px 13px;animation:slidein .3s ease}
.ptitle{display:flex;align-items:center;justify-content:space-between;margin-bottom:9px}
.ptitle-lbl{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.1em;text-transform:uppercase}

.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.row2{display:grid;grid-template-columns:1fr 1.4fr;gap:10px}
.row3b{display:grid;grid-template-columns:260px 1fr 1fr;gap:10px;align-items:start}

.slo-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--b)}
.slo-row:last-child{border-bottom:none}
.slo-label{font-family:var(--mono);font-size:10px;color:var(--t2)}
.slo-val{font-family:var(--mono);font-size:11px;font-weight:500}
.slo-bar-track{height:3px;background:var(--bg4);border-radius:2px;margin-top:3px;overflow:hidden;width:80px}
.slo-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.mrow{display:flex;align-items:center;justify-content:space-between;padding:4px 0;border-bottom:1px solid var(--b)}
.mrow:last-child{border-bottom:none}
.mkey{font-family:var(--mono);font-size:10px;color:var(--t2)}
.mval{font-family:var(--mono);font-size:11px;font-weight:500}

.svc-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--b)}
.svc-row:last-child{border-bottom:none}
.svc-name{font-family:var(--mono);font-size:10px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.svc-mem{font-family:var(--mono);font-size:9px;color:var(--t3);min-width:66px;text-align:right}

.tl-event{display:flex;align-items:flex-start;gap:9px;padding:6px 0;position:relative;animation:slidein .3s ease}
.tl-icon{width:22px;height:22px;border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0;font-size:10px;font-family:var(--mono)}
.tl-ts{font-family:var(--mono);font-size:9px;color:var(--t3)}
.tl-msg{font-family:var(--mono);font-size:10px;color:var(--t1);margin-top:1px}
.tl-sub{font-size:10px;color:var(--t3);margin-top:1px}

.inc-card{border-radius:6px;padding:9px 11px;margin-bottom:7px;animation:slidein .3s ease}
.rca-act{font-family:var(--mono);font-size:10px;color:var(--t2);padding:3px 6px 3px 12px;background:var(--bg3);border-radius:4px;margin-bottom:3px;position:relative}
.rca-act::before{content:'›';position:absolute;left:4px;color:var(--purple)}
.fp-row{display:flex;align-items:center;gap:7px;padding:4px 0;border-bottom:1px solid var(--b)}
.slo-row{display:flex;align-items:center;justify-content:space-between;padding:5px 0;border-bottom:1px solid var(--b)}
.slo-row:last-child{border-bottom:none}
.slo-label{font-family:var(--mono);font-size:10px;color:var(--t2)}
.slo-val{font-family:var(--mono);font-size:11px;font-weight:500}
.slo-bar-track{height:3px;background:var(--bg4);border-radius:2px;margin-top:3px;overflow:hidden;width:80px}
.slo-bar-fill{height:100%;border-radius:2px;transition:width .6s ease}
.fp-row:last-child{border-bottom:none}

.error-box{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.25);border-radius:8px;padding:16px;margin:20px;font-family:var(--mono);font-size:11px;color:var(--crit);line-height:1.7}
.loading-box{display:flex;align-items:center;justify-content:center;height:200px;font-family:var(--mono);font-size:11px;color:var(--t3)}
</style>
</head>
<body>

<div class="topbar">
  <div class="brand">
    <img src="vorsa_logo.png" alt="Vorsa" style="height:24px;width:auto" onerror="this.style.display='none';document.getElementById('brand-txt').style.display='block'">
    <span id="brand-txt" style="display:none;font-family:var(--mono);font-size:13px;font-weight:600;color:var(--t1)">Vorsa <span style="color:var(--purple)">//</span> control plane</span>
    <span class="brand-tag">your stack, under control.</span>
  </div>
  <div class="topbar-r">
    <div class="pulse-wrap"><div class="pulse-dot"></div><span id="poll-status">loading...</span></div>
    <span class="clock" id="clock"></span>
    <span id="env-chip" style="font-family:var(--mono);font-size:10px;padding:3px 8px;border-radius:4px;background:rgba(124,110,247,.1);color:var(--purple);border:1px solid rgba(124,110,247,.2)">—</span>
    <button class="refresh-btn" onclick="loadState()">↺ refresh</button>
  </div>
</div>

<div class="layout">
  <div class="sidebar" id="sidebar">
    <div class="sb-sec">environments</div>
    <div id="env-list"></div>
    <div class="sb-sep"></div>
    <div class="sb-sec">platform</div>
    <div class="sb-link" onclick="window.open('state.json','_blank')"><span>telemetry</span></div>
    <div class="sb-link" onclick="window.location.href='metrics.html'" style="color:var(--purple)"><span>metrics / slo</span></div>
    <div class="sb-link" onclick="window.open('../incidents/','_blank')"><span>incidents</span></div>
    <div class="sb-link" onclick="window.open('../logs/alerts.jsonl','_blank')"><span>alert log</span></div>
    <div class="sb-sep"></div>
    <div class="sb-sec">collectors</div>
    <div id="collector-list"></div>
    <div class="sb-sep"></div>
    <div class="sb-sec">vorsa</div>
    <div class="sb-link"><span>correlation rules</span></div>
    <div class="sb-link"><span>runbooks</span></div>
    <div class="sb-link"><span>dependencies</span></div>
  </div>
  <div class="main" id="content">
    <div class="loading-box">connecting to control plane...</div>
  </div>
</div>

<script>
let state = null;
let activeIdx = 0;

// ── Helpers ──────────────────────────────────────────────────────────────────

const C = {ok:'#22c97a',warn:'#f0a42e',crit:'#ef4444',blue:'#4a9eff',purple:'#7c6ef7',text3:'#5c647a'};
const CBG = {ok:'rgba(34,201,122,.1)',warn:'rgba(240,164,46,.1)',crit:'rgba(239,68,68,.1)',blue:'rgba(74,158,255,.1)',purple:'rgba(124,110,247,.1)'};
const CBD = {ok:'rgba(34,201,122,.25)',warn:'rgba(240,164,46,.25)',crit:'rgba(239,68,68,.25)',blue:'rgba(74,158,255,.25)',purple:'rgba(124,110,247,.25)'};

function sevColor(s){ return C[s]||C.ok; }
function sevBg(s){ return CBG[s]||CBG.ok; }
function sevBd(s){ return CBD[s]||CBD.ok; }

function badge(text, s, lg){
  const c=sevColor(s),bg=sevBg(s),bd=sevBd(s);
  const sz = lg ? 'font-size:10px;padding:4px 12px;border-radius:4px' : 'font-size:9px;padding:2px 6px;border-radius:3px';
  return `<span style="font-family:monospace;${sz};background:${bg};color:${c};border:1px solid ${bd};white-space:nowrap">${text}</span>`;
}

function dot(sev, pulse){
  const c = sevColor(sev);
  return `<div class="dot"><div class="dot-i" style="background:${c}"></div>${pulse?`<div class="dot-p" style="background:${c}"></div>`:''}</div>`;
}

function bar(pct, sev){
  return `<div style="height:3px;background:#1f2435;border-radius:2px;margin-top:5px;overflow:hidden">
    <div style="height:100%;width:${Math.min(pct||0,100)}%;background:${sevColor(sev)};border-radius:2px;transition:width .6s ease"></div>
  </div>`;
}

function mrow(label, val, sev){
  return `<div class="mrow"><span class="mkey">${label}</span><span class="mval" style="color:${sev?sevColor(sev):'#e8eaf0'}">${val}</span></div>`;
}

function spark(data, sev){
  if(!data||data.length<2) return '';
  const valid = data.filter(v=>v>0);
  if(valid.length<2) return '';
  const max=Math.max(...valid,1),min=Math.min(...valid,0),range=max-min||1;
  const pts = data.map((v,i)=>{
    const x=(i/(data.length-1))*80;
    const y=v===0?24:24-((v-min)/range)*20-2;
    return `${x.toFixed(1)},${y.toFixed(1)}`;
  }).join(' ');
  return `<svg width="80" height="26" style="display:block;margin-top:7px"><polyline points="${pts}" fill="none" stroke="${sevColor(sev)}" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" opacity=".8"/></svg>`;
}

function tlIcon(type){
  const bg=sevBg(type)||'rgba(255,255,255,.05)';
  const bc=sevColor(type)||C.text3;
  const g={ok:'✓',warn:'!',warning:'!',crit:'✗',critical:'✗',blue:'↻',purple:'⬡',info:'↻',ok:'✓'}[type]||'·';
  return `<div class="tl-icon" style="background:${bg};border:1px solid ${bc}40;color:${bc}">${g}</div>`;
}

function fmtTime(iso){
  if(!iso) return '—';
  const d=new Date(iso.replace(' ','T').replace('+00:00','Z'));
  const p=n=>String(n).padStart(2,'0');
  return `${p(d.getUTCHours())}:${p(d.getUTCMinutes())}:${p(d.getUTCSeconds())} UTC`;
}

function normSev(s){
  if(!s) return 'ok';
  if(s==='warning') return 'warn';
  if(s==='critical') return 'crit';
  return s;
}

function healthLabel(env){
  return env.health_label || (env.overall_severity==='critical'?'CRITICAL':env.overall_severity==='warning'?'DEGRADED':'HEALTHY');
}

function healthSev(env){
  return normSev(env.overall_severity||'ok');
}

// ── Clock ────────────────────────────────────────────────────────────────────

function tick(){
  const now=new Date();
  const p=n=>String(n).padStart(2,'0');
  document.getElementById('clock').textContent=
    `${now.getUTCFullYear()}-${p(now.getUTCMonth()+1)}-${p(now.getUTCDate())} ${p(now.getUTCHours())}:${p(now.getUTCMinutes())}:${p(now.getUTCSeconds())} UTC`;
}
tick(); setInterval(tick,1000);

// ── Load state ───────────────────────────────────────────────────────────────

async function loadState(){
  document.getElementById('poll-status').textContent='refreshing...';
  try{
    const res=await fetch('state.json?t='+Date.now());
    if(!res.ok) throw new Error('HTTP '+res.status);
    state=await res.json();
    render();
    document.getElementById('poll-status').textContent='last poll: '+fmtTime(state.polled_at);
  }catch(e){
    document.getElementById('poll-status').textContent='error';
    document.getElementById('content').innerHTML=
      `<div class="error-box">Could not load state.json<br><br>${e.message}<br><br>
      Start HTTP server from repo root:<br><code>python -m http.server 8888</code><br><br>
      Then open: <code>http://localhost:8888/dashboard/index.html</code></div>`;
  }
}

// ── Render ────────────────────────────────────────────────────────────────────

function render(){
  if(!state||!state.environments) return;
  renderSidebar();
  renderCollectors();
  renderEnv(activeIdx);
}

function renderSidebar(){
  const el=document.getElementById('env-list');
  el.innerHTML=state.environments.map((env,i)=>{
    const s=normSev(env.overall_severity);
    const active=i===activeIdx;
    return `<div class="${active?'sb-env':'sb-env-inactive'}" onclick="selectEnv(${i})">
      ${dot(s,s!=='ok')}
      <span style="font-family:monospace;font-size:10px;color:${active?'#e8eaf0':'#9ba3b8'};flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${env.name}</span>
      ${env.incidents&&env.incidents.length>0?badge(env.incidents.length,s):'<span style="font-family:monospace;font-size:9px;color:var(--ok)">✓</span>'}
    </div>`;
  }).join('');
}

function renderCollectors(){
  const env = state.environments[activeIdx];
  if(!env) return;
  const pg = env.postgres;
  const http = env.http;
  const win = env.windows;
  const cols = [
    {n:'postgres',s:pg?(pg.available?normSev(pg.severity):'crit'):'ok'},
    {n:'http',s:http?(normSev(http.overall_severity)):'ok'},
    {n:'windows/wmi',s:win?(win.available?normSev(win.severity):'warn'):'ok'},
    {n:'qmatic/jdbc',s:env.services&&Object.keys(env.services.connections_by_db||{}).length>0?'ok':'warn'},
  ];
  document.getElementById('collector-list').innerHTML=cols.map(c=>
    `<div class="sb-link">
      <div style="width:5px;height:5px;border-radius:50%;background:${sevColor(c.s)};flex-shrink:0;animation:${c.s==='ok'?'pulse 3s infinite':'none'}"></div>
      <span>${c.n}</span>
    </div>`).join('');
}

function selectEnv(i){
  activeIdx=i;
  render();
}

// ── Environment renderer ──────────────────────────────────────────────────────


function sloC(s){
  return s==='ok'?'var(--ok)':s==='at_risk'?'var(--amber)':'var(--crit)';
}

function sloBadge(s){
  var t = s==='ok'?'on track':s==='at_risk'?'at risk':'breached';
  var bg = s==='ok'?'rgba(34,201,122,.1)':s==='at_risk'?'rgba(240,164,46,.1)':'rgba(239,68,68,.1)';
  var bd = s==='ok'?'rgba(34,201,122,.25)':s==='at_risk'?'rgba(240,164,46,.25)':'rgba(239,68,68,.25)';
  var c = sloC(s);
  return '<span style="font-family:monospace;font-size:9px;padding:1px 6px;border-radius:3px;background:'+bg+';color:'+c+';border:1px solid '+bd+'">'+t+'</span>';
}

function renderSloPanel(slo){
  if(!slo) return '';
  var oc = sloC(slo.overall_status);
  var obg = slo.overall_status==='ok'?'rgba(34,201,122,.05)':slo.overall_status==='at_risk'?'rgba(240,164,46,.05)':'rgba(239,68,68,.05)';
  var budgetC = slo.error_budget_remaining_pct>50?'var(--ok)':slo.error_budget_remaining_pct>10?'var(--amber)':'var(--crit)';

  function row(label, val, sub, status){
    return '<div class="slo-row">'
      + '<span class="slo-label">'+label+'</span>'
      + '<span class="slo-val" style="color:'+sloC(status)+'">'+val
      + '<span style="font-family:monospace;font-size:8px;color:var(--t3)"> / '+sub+'</span>'
      + '</span></div>';
  }

  return '<div class="panel" style="border-left:3px solid '+oc+';background:'+obg+'">'
    + '<div class="ptitle">'
    + '<span class="ptitle-lbl">slo status</span>'
    + '<div style="display:flex;align-items:center;gap:8px">'
    + sloBadge(slo.overall_status)
    + '<a href="metrics.html" style="font-family:monospace;font-size:9px;color:#7c6ef7;text-decoration:none">metrics ↗</a>'
    + '</div></div>'
    + row('availability', slo.availability_pct.toFixed(3)+'%', slo.availability_target+'%', slo.availability_status)
    + row('api latency', slo.latency_current_ms+'ms', slo.latency_budget_ms+'ms', slo.latency_status)
    + row('pg saturation', slo.pg_current_pct.toFixed(1)+'%', slo.pg_target_pct+'%', slo.pg_status)
    + '<div class="slo-row"><span class="slo-label">error budget</span>'
    + '<span class="slo-val" style="color:'+budgetC+'">'+slo.error_budget_remaining_pct.toFixed(1)+'% remaining</span></div>'
    + '</div>';
}

function renderEnv(i){
  const env=state.environments[i];
  if(!env){ document.getElementById('content').innerHTML='<div class="loading-box">no environment data</div>'; return; }

  document.getElementById('env-chip').textContent=env.name;

  const pg=env.postgres;
  const http=env.http;
  const win=env.windows;
  const svc=env.services;
  const incs=env.incidents||[];
  const suppressed=env.suppressed_warnings||[];

  const envSev=healthSev(env);
  const envSevC=sevColor(envSev);
  const hs=env.health_score??97;
  const hlabel=healthLabel(env);
  const hlgBadge=envSev==='ok'?'ok':envSev==='warn'||envSev==='warning'?'warn':'crit';

  const pgSev=pg?normSev(pg.severity):'ok';
  const httpSev=http?normSev(http.overall_severity):'ok';
  const winSev=win?normSev(win.severity):'ok';

  // ── Health bar ──
  let html=`<div class="panel" style="padding:11px 15px">
    <div style="display:flex;align-items:center;justify-content:space-between">
      <div style="display:flex;align-items:center;gap:18px">
        <div>
          <div style="font-family:monospace;font-size:20px;font-weight:600;color:${envSevC};line-height:1">${hs}</div>
          <div style="font-family:monospace;font-size:9px;color:var(--t3);margin-top:2px;letter-spacing:.08em;text-transform:uppercase">health</div>
        </div>
        <div style="width:1px;height:34px;background:var(--b)"></div>
        <div style="display:flex;gap:16px">
          ${[
            {l:'incidents',v:incs.length,s:incs.length>0?envSev:'ok'},
            {l:'pg pool',v:pg?pg.connection_pct.toFixed(1)+'%':'—',s:pgSev},
            {l:'latency',v:http&&http.checks&&http.checks[0]?http.checks[0].latency_ms.toFixed(0)+'ms':'—',s:httpSev},
            {l:'srv mem',v:win?win.memory_used_pct.toFixed(1)+'%':'—',s:win?normSev(win.memory_severity||'ok'):'ok'},
            {l:'qmatic',v:win?win.services.filter(s=>s.state==='Running').length+'/'+win.services.length:'—',s:win&&win.services.some(s=>s.state!=='Running')?'crit':'ok'},
          ].map(m=>`<div style="text-align:center">
            <div style="font-family:monospace;font-size:14px;font-weight:500;color:${sevColor(m.s)}">${m.v}</div>
            <div style="font-family:monospace;font-size:9px;color:var(--t3);margin-top:1px;text-transform:uppercase">${m.l}</div>
          </div>`).join('')}
        </div>
      </div>
      <div style="display:flex;align-items:center;gap:10px">
        <div style="text-align:right">
          <div style="font-family:monospace;font-size:9px;color:var(--t3)">${env.description||env.name}</div>
          <div style="font-family:monospace;font-size:9px;color:var(--t3);margin-top:2px">polled ${fmtTime(env.polled_at)}</div>
        </div>

      <text x="109" y="305" text-anchor="middle" fill="#4a9eff" font-size="7" font-weight="500">Counter App</text>
      <text x="109" y="316" text-anchor="middle" fill="#5c647a" font-size="6">Staff · Serving</text>

      <rect x="148" y="292" width="66" height="30" rx="4" fill="#141720" stroke="rgba(74,158,255,.25)" stroke-width=".5"/>
      <text x="181" y="305" text-anchor="middle" fill="#4a9eff" font-size="7" font-weight="500">Queue Display</text>
      <text x="181" y="316" text-anchor="middle" fill="#5c647a" font-size="6">Signage · Boards</text>

      <!-- ── BI / Reports ── -->
      <rect x="180" y="312" width="150" height="34" rx="5"
            fill="#141720" stroke="${sevColor('blue')}40" stroke-width=".5"/>
      <text x="255" y="326" text-anchor="middle" fill="${sevColor('blue')}" font-size="8" font-weight="500" opacity=".8">BI / Historical Reports</text>
      <text x="255" y="338" text-anchor="middle" fill="#5c647a" font-size="7">Analytics · KPIs · Trends</text>

      <!-- Legend -->
      <rect x="4" y="364" width="328" height="42" rx="4" fill="#0f1117" stroke="rgba(255,255,255,.05)" stroke-width=".5"/>
      <text x="12" y="376" fill="#5c647a" font-size="7">Legend:</text>
      <line x1="58" y1="373" x2="82" y2="373" stroke="#5c647a" stroke-width=".5" marker-end="url(#darr)"/>
      <text x="86" y="376" fill="#5c647a" font-size="7">via API Gateway</text>
      <line x1="168" y1="373" x2="192" y2="373" stroke="#4a9eff" stroke-width=".5" stroke-dasharray="3 3" marker-end="url(#darrb)"/>
      <text x="196" y="376" fill="#4a9eff" font-size="7">direct Orchestra auth</text>
      <text x="12" y="390" fill="#5c647a" font-size="7">PostgreSQL: ${pg?pg.connection_pct.toFixed(1)+'% pool · '+pg.active_connections+' active':'unavailable'} · qp_central ${jdbcC} · statdb ${jdbcS} · qp_agent ${jdbcA} · qp_calendar ${jdbcCal} · qp_app ${jdbcApp}</text>
    </svg>`;
  }else{
    html+=`<div style="font-family:monospace;font-size:10px;color:var(--t3);padding:8px 0">no windows data</div>`;
  }
  html+=`</div>`;

  // Vorsa Intelligence
  html+=`<div class="panel" style="border-left:3px solid var(--purple)">
    <div style="display:flex;align-items:center;gap:8px;margin-bottom:9px">
      <div style="width:18px;height:18px;background:rgba(124,110,247,.15);border-radius:4px;display:flex;align-items:center;justify-content:center;font-size:10px;color:var(--purple)">⬡</div>
      <span style="font-family:monospace;font-size:9px;color:var(--purple);letter-spacing:.08em;text-transform:uppercase">Vorsa operational intelligence</span>
      ${badge(incs.length===0?'no anomalies':incs.length+' correlated',incs.length===0?'ok':envSev)}
    </div>
    <div style="font-size:11px;color:var(--t2);line-height:1.65;margin-bottom:9px">
      ${incs.length===0
        ?'No correlated anomalies in current poll cycle. All signal chains evaluated — PostgreSQL saturation, API latency, JDBC pool state, and service availability. No pattern match against active correlation rules.'
        :incs.map(inc=>`<strong style="color:var(--t1)">${inc.title}</strong> — conf ${inc.confidence||'?'}%`).join('<br>')}
    </div>`;

  // Fingerprints from incident history  
  const fps=[];
  if(incs.length>0){
    incs.forEach(inc=>{
      fps.push({n:inc.incident_type,conf:inc.confidence||0,ls:'now'});
    });
  }
  if(fps.length>0){
    html+=`<div style="font-family:monospace;font-size:9px;color:var(--t3);letter-spacing:.08em;text-transform:uppercase;margin-bottom:5px">active incident fingerprints</div>`;
    fps.forEach(fp=>{
      html+=`<div class="fp-row">
        <span style="font-family:monospace;font-size:10px;color:var(--t2);flex:1">${fp.n}</span>
        ${badge(fp.conf+'%',fp.conf>=80?'ok':'warn')}
        <span style="font-family:monospace;font-size:9px;color:var(--t3)">${fp.ls}</span>
      </div>`;
    });
    html+=`<div style="height:7px"></div>`;
  }

  const defaultActs=['Review pg_stat_activity if connections exceed 75%','Validate API health endpoint URL when available','Map statdb schema to enable activity checks','Consider alerting integration for critical incidents'];
  const acts=incs.length>0&&incs[0].recommended_actions?incs[0].recommended_actions:defaultActs;
  acts.forEach(a=>{ html+=`<div class="rca-act">${a}</div>`; });
  html+=`</div>`;

  // Incidents
  html+=`<div class="panel">
    <div class="ptitle">
      <span class="ptitle-lbl">correlated incidents</span>
      ${badge(incs.length>0?incs.length+' active':'all clear',incs.length>0?envSev:'ok')}
    </div>`;
  if(incs.length===0){
    html+=`<div style="font-family:monospace;font-size:10px;color:var(--t3);padding:7px 0;display:flex;align-items:center;gap:6px"><span style="color:var(--ok)">✓</span>No incidents — all systems nominal</div>`;
  }else{
    incs.forEach(inc=>{
      const is=normSev(inc.severity);
      const ic=sevColor(is);
      html+=`<div class="inc-card" style="border-left:3px solid ${ic};background:${sevBg(is)};border-top:1px solid ${sevBd(is)};border-right:1px solid ${sevBd(is)};border-bottom:1px solid ${sevBd(is)}">
        <div style="display:flex;align-items:flex-start;justify-content:space-between;gap:8px;margin-bottom:3px">
          <div style="font-size:11px;font-weight:500;color:var(--t1)">${inc.title}</div>
          ${badge('conf '+(inc.confidence||'?')+'%',inc.confidence>=80?'ok':inc.confidence>=50?'warn':'ok')}
        </div>
        <div style="font-family:monospace;font-size:9px;color:var(--t3);margin-bottom:5px">${inc.incident_type} · ${(inc.severity||'').toUpperCase()} · ${fmtTime(inc.generated_at)}</div>
        ${(inc.evidence||[]).map(e=>`<div style="font-family:monospace;font-size:9px;color:var(--t2);display:flex;gap:8px;padding:2px 0">
          <span style="color:var(--t3);min-width:58px">${e.source.toUpperCase()}</span>
          <span>${e.signal}: <span style="color:var(--t1)">${e.value}</span></span>
        </div>`).join('')}
        ${(inc.recommended_actions||[]).slice(0,2).map(a=>`<div style="font-family:monospace;font-size:9px;color:var(--t2);padding:2px 0 2px 10px;margin-top:2px;position:relative"><span style="position:absolute;left:0;color:var(--t3)">›</span>${a}</div>`).join('')}
      </div>`;
    });
  }
  html+=`</div></div>`;

  document.getElementById('content').innerHTML=html;
}

loadState();
setInterval(loadState, 60000);
</script>
</body>
</html>
